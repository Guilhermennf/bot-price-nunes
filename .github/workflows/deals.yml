name: deals

on:
  schedule:
    # Collect runs. GitHub delays/coalesces scheduled workflows heavily
    # (observed 40min-4h gaps) — POSTING does not rely on this; an external
    # scheduler (cron-job.org) fires workflow_dispatch mode=post instead.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "collect (scrape->queue) or post (drain queue to channel)"
        type: choice
        options: [collect, post]
        default: collect

# Avoid overlapping runs if one takes long.
concurrency:
  group: deals-${{ inputs.mode || 'collect' }}
  cancel-in-progress: false

permissions:
  actions: write   # lets the keepalive step reset the 60-day auto-disable timer

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MODE: ${{ inputs.mode || 'collect' }}
    steps:
      - uses: actions/checkout@v7

      # Scheduled workflows are auto-disabled after 60 days without repo
      # activity; re-enabling via the API resets that countdown.
      - name: Keepalive
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/deals.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Chromium is needed by collect runs (Mercado Livre landing resolver);
      # post runs are light (queue -> Telegram) and skip it.
      - name: Install Playwright Chromium
        if: env.MODE == 'collect'
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ENABLE_CHECKOUT_SIM: "false"
        run: |
          if [ "$MODE" = "post" ]; then
            python -m app.main --post-queue 1
          else
            python -m app.main
          fi
