name: deals

on:
  schedule:
    # Best-effort every 30 min. GitHub may delay/coalesce under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Avoid overlapping runs if one takes long.
concurrency:
  group: deals
  cancel-in-progress: false

permissions:
  actions: write   # lets the keepalive step reset the 60-day auto-disable timer

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Scheduled workflows are auto-disabled after 60 days without repo
      # activity; re-enabling via the API resets that countdown.
      - name: Keepalive
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/deals.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Chromium is only needed if ENABLE_BROWSER_CONFIRM / ENABLE_CHECKOUT_SIM
      # are turned on (both default false) — skip the ~90s install until then.
      # - name: Install Playwright Chromium
      #   run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENABLE_CHECKOUT_SIM: "false"
        run: python -m app.main
