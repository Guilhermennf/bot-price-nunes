version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    groups:
      dashboard-deps:
        patterns: ["*"]
    ignore:
      # TS 7 broke `next build`'s TypeScript detection (major rewrite);
      # revisit manually once Next.js supports it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
